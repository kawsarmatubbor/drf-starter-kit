<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Account Activation OTP</title>
    </head>

    <body
        style="
            margin: 0;
            padding: 0;
            font-family:
                -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto,
                Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #0ea5e9);
        "
    >
        <table
            width="100%"
            cellpadding="0"
            cellspacing="0"
            style="padding: 50px 0"
        >
            <tr>
                <td align="center">
                    <!-- Glass Card -->
                    <table
                        width="500"
                        cellpadding="0"
                        cellspacing="0"
                        style="
                            background: rgba(255, 255, 255, 0.08);
                            border: 1px solid rgba(255, 255, 255, 0.2);
                            border-radius: 20px;
                            overflow: hidden;
                            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
                            backdrop-filter: blur(16px);
                        "
                    >
                        <!-- Icon -->
                        <tr>
                            <td
                                style="
                                    padding: 35px 30px 10px;
                                    text-align: center;
                                "
                            >
                                <div
                                    style="
                                        display: inline-block;
                                        width: 100px;
                                        height: 100px;
                                        line-height: 80px;
                                        border-radius: 50%;
                                        font-size: 60px;
                                    "
                                >
                                    ✉️
                                </div>
                            </td>
                        </tr>

                        <!-- Title -->
                        <tr>
                            <td style="text-align: center; padding: 10px 30px">
                                <h2
                                    style="
                                        margin: 0;
                                        color: #ffffff;
                                        font-size: 26px;
                                        font-weight: 700;
                                    "
                                >
                                    Activate Your Account
                                </h2>
                                <p
                                    style="
                                        margin: 10px 0 0;
                                        color: #dbeafe;
                                        font-size: 14px;
                                    "
                                >
                                    Use the verification code below to complete
                                    your registration
                                </p>
                            </td>
                        </tr>

                        <!-- OTP -->
                        <tr>
                            <td align="center" style="padding: 35px 0">
                                <div
                                    style="
                                        display: inline-block;
                                        padding: 18px 36px;
                                        font-size: 30px;
                                        letter-spacing: 12px;
                                        font-weight: 700;
                                        color: #0ea5e9;
                                        background: rgba(255, 255, 255, 0.9);
                                        border-radius: 14px;
                                        box-shadow: 0 10px 30px
                                            rgba(0, 0, 0, 0.25);
                                    "
                                >
                                    {{ otp }}
                                </div>
                            </td>
                        </tr>

                        <!-- Info -->
                        <tr>
                            <td
                                style="
                                    text-align: center;
                                    padding: 0 30px 20px;
                                    color: #e0f2fe;
                                    font-size: 13px;
                                "
                            >
                                ⏳ This OTP expires in
                                <strong style="color: #ffffff">5 minutes</strong
                                >.
                            </td>
                        </tr>

                        <!-- Warning -->
                        <tr>
                            <td
                                style="
                                    text-align: center;
                                    padding: 0 30px 30px;
                                    color: #bae6fd;
                                    font-size: 12px;
                                "
                            >
                                If you didn’t create this account, you can
                                safely ignore this email.
                            </td>
                        </tr>

                        <!-- Footer -->
                        <tr>
                            <td
                                style="
                                    text-align: center;
                                    padding: 18px;
                                    font-size: 12px;
                                    color: #93c5fd;
                                    border-top: 1px solid
                                        rgba(255, 255, 255, 0.2);
                                "
                            >
                                © {{ year }} Matubbor Technology Ltd
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </body>
</html>
